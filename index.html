<style>
  :root{
    --wood-dark:#3a2418;
    --wood:#5c3a24;
    --wall:#6b4730;
    --rug:#8a2f2f;
    --rug-dark:#6e2424;
    --gold:#d4a847;
    --gold-deep:#9c7a2e;
    --cream:#f0e3c8;
    --ink:#241810;
    --lamp:#f2c463;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--ink);
    font-family:'Shippori Mincho', serif;
    padding:14px;
  }
  @media (max-width: 480px){
    body{ padding:6px; }
    .frame{ min-height: calc(100vh - 12px); display:flex; flex-direction:column; }
    .scene{ flex:1; display:flex; flex-direction:column; justify-content:space-evenly; padding:20px 10px; }
    .sprite-wrap{ width:58%; }
    .nameplate{ font-size:13px; padding:9px 5px; }
    .nameplate .sub{ font-size:9.5px; }
    .nameplate .badge{ font-size:6.5px; padding:1.5px 5px; }
  }
  .pixel{font-family:'Press Start 2P', monospace;}

  .frame{
    position:relative;
    border:4px solid var(--gold-deep);
    box-shadow:0 0 0 2px var(--ink), 6px 6px 0 rgba(0,0,0,0.5);
    background:var(--wall);
    overflow:hidden;
  }
  .title-bar{
    background:var(--wood-dark);
    color:var(--gold);
    text-align:center;
    padding:10px 8px;
    font-size:11px;
    letter-spacing:2px;
    border-bottom:3px solid var(--gold-deep);
  }
  .title-bar .sub{
    font-family:'Shippori Mincho', serif;
    font-size:11px;
    color:var(--cream);
    letter-spacing:4px;
    margin-top:4px;
    opacity:0.8;
  }

  .scene{
    position:relative;
    background:linear-gradient(180deg, var(--wall) 0%, var(--wall) 100%);
    padding:14px 10px 10px;
  }

  .lamp-row{ display:flex; justify-content:space-around; margin-bottom:4px; }
  .lamp{ width:10px; }
  .lamp::before{ content:''; display:block; width:2px; height:14px; background:var(--wood-dark); margin:0 auto; }
  .lamp-shade{
    width:34px; height:18px;
    background:var(--lamp);
    border:3px solid var(--wood-dark);
    border-radius:4px 4px 14px 14px;
    box-shadow:0 0 18px 6px rgba(242,196,99,0.3);
    margin:0 auto;
  }

  .floor-label{
    text-align:center; color:var(--cream); font-size:9px;
    opacity:0.55; letter-spacing:3px; margin:6px 0 8px;
  }

  .grid{ display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; }

  .station{
    text-align:center; position:relative;
    text-decoration:none; display:block; color:inherit;
  }
  a.station{ cursor:pointer; transition:transform .15s ease; }
  a.station:hover{ transform:translateY(-3px); }
  a.station:hover .speech{ opacity:1; transform:translateY(0); }

  .speech{
    position:absolute; top:-2px; left:50%;
    transform:translateX(-50%) translateY(6px);
    background:var(--cream); color:var(--ink);
    font-size:8px; padding:4px 6px;
    border:2px solid var(--wood-dark);
    white-space:nowrap; opacity:0;
    transition:opacity .15s ease, transform .15s ease;
    pointer-events:none; z-index:5;
  }

  .sprite-wrap{ width:48%; margin:0 auto; }

  .nameplate{
    background:var(--wood-dark);
    border:2px solid var(--gold-deep);
    color:var(--gold);
    font-size:11.5px; padding:7px 4px;
    letter-spacing:0.5px; margin-top:6px;
    line-height:1.4;
    box-shadow:2px 2px 0 rgba(0,0,0,0.4);
  }
  .nameplate .sub{
    display:block; font-family:'Shippori Mincho', serif;
    font-size:8.5px; color:var(--cream); opacity:0.75; margin-top:4px;
  }
  .nameplate .badge{
    display:inline-block;
    margin-top:5px;
    padding:2px 6px;
    font-family:'Press Start 2P', monospace;
    font-size:7px;
    letter-spacing:0.5px;
    background:var(--gold);
    color:var(--ink);
    border:1px solid var(--ink);
  }

  .desk-base{ width:55%; height:10px; margin:0 auto; background:var(--wood); border:2px solid var(--wood-dark); }

  .tenant{ opacity:0.7; }
  .tenant .nameplate{ color:#c9a878; border-color:#6b5536; }

  .rug{ margin:14px auto 4px; width:90%; height:14px; background:var(--rug); border:3px solid var(--rug-dark); }

  footer{ text-align:center; color:#8a7a5c; font-size:8px; padding:9px; background:var(--wood-dark); letter-spacing:1px; }
</style>
</head>
<body>

<div class="frame">
  <div class="title-bar pixel">
    ZAKURO CONTENT OFFICE
    <div class="sub">— 部署をクリックでProjectへ —</div>
  </div>

  <div class="scene">
    <div class="lamp-row">
      <div class="lamp"><div class="lamp-shade"></div></div>
      <div class="lamp"><div class="lamp-shade"></div></div>
      <div class="lamp"><div class="lamp-shade"></div></div>
    </div>
    <div class="floor-label pixel">2F — テナント区画</div>
    <div class="grid" id="tenant-row"></div>

    <div class="rug"></div>
    <div class="floor-label pixel">1F — 営業中</div>
    <div class="grid" id="active-row"></div>
  </div>

  <footer class="pixel">CLICK A DEPARTMENT</footer>
</div>

<script>
const departments = [
  { id:"insta", name:"Insta部", sub:"@luxury_villa_zakuro", status:"active", sprite:"insta",
    projectId:"019ee0e3-8354-724f-9c76-b5f8b28b4eac" },
  { id:"note",  name:"note部",  sub:"note.com/zack396",     status:"active", sprite:"note",
    projectId:"019eb795-86bb-7648-9983-afb78badd4b8" },
  { id:"webmag",name:"WEBマガジン企画部", sub:"coming soon", status:"coming_soon", sprite:"door" },

// ── 経理部：あとでProject IDだけ差し替えればOK ──
const ACCOUNTING_PROJECT_ID = "019ee826-fcc3-74b3-9841-d6fd6f21826a";

// 2F（テナント区画）に入居する部署。先頭から順に空き区画を埋めていく。
const tenantDepartments = [
  { id:"accounting", name:"経理部", sub:"月次資料チェック", status:"active", sprite:"accounting",
    projectId: ACCOUNTING_PROJECT_ID, badge: ACCOUNTING_STATUS_BADGE },
];

const TENANT_SLOTS = 3;

    return `<svg width="100%" viewBox="0 0 40 48" preserveAspectRatio="xMidYMax meet">
      <ellipse cx="20" cy="46" rx="11" ry="2.2" fill="rgba(0,0,0,0.35)"/>

      <rect x="21" y="36" width="6" height="9" fill="#3a2a1f"/>
      <rect x="9" y="24" width="22" height="14" rx="2" fill="#c9477a"/>
      <rect x="9" y="24" width="22" height="4" fill="#e06a99"/>
      <rect x="6" y="26" width="4" height="9" fill="#c9477a"/>
      <rect x="30" y="26" width="4" height="9" fill="#c9477a"/>
      <rect x="5" y="33" width="6" height="5" fill="#f2c9a0"/>
      <rect x="29" y="33" width="6" height="5" fill="#f2c9a0"/>
      <rect x="8" y="2" width="24" height="22" rx="6" fill="#f7d9b6"/>
      <rect x="6" y="0" width="28" height="10" rx="6" fill="#3a2418"/>
      <rect x="6" y="6" width="6" height="16" fill="#3a2418"/>
      <rect x="28" y="6" width="6" height="16" fill="#3a2418"/>
      <rect x="14" y="13" width="3" height="4" fill="#241810"/>
      <rect x="23" y="13" width="3" height="4" fill="#241810"/>
      <rect x="11" y="17" width="3" height="2" fill="#e89a8a"/>
      <rect x="26" y="17" width="3" height="2" fill="#e89a8a"/>
      <rect x="2" y="29" width="6" height="9" rx="1" fill="#241810"/>
      <rect x="3" y="30" width="4" height="6" fill="#f2c463"/>
    </svg>`;
  }
  if(kind === "note"){
    return `<svg width="100%" viewBox="0 0 40 48" preserveAspectRatio="xMidYMax meet">
      <ellipse cx="20" cy="46" rx="11" ry="2.2" fill="rgba(0,0,0,0.35)"/>
      <rect x="13" y="36" width="6" height="9" fill="#2a2a2a"/>
      <rect x="21" y="36" width="6" height="9" fill="#2a2a2a"/>
      <rect x="8" y="22" width="24" height="16" rx="2" fill="#3a4a6b"/>
      <rect x="8" y="22" width="24" height="4" fill="#4a5c82"/>
      <rect x="18" y="24" width="4" height="12" fill="#d4a847"/>
      <rect x="5" y="25" width="4" height="9" fill="#3a4a6b"/>
      <rect x="31" y="25" width="4" height="9" fill="#3a4a6b"/>
      <rect x="4" y="32" width="6" height="5" fill="#f2c9a0"/>
      <rect x="30" y="32" width="6" height="5" fill="#f2c9a0"/>
      <rect x="8" y="2" width="24" height="22" rx="6" fill="#f2c9a0"/>
      <rect x="7" y="0" width="26" height="9" rx="5" fill="#241810"/>
      <rect x="12" y="13" width="7" height="5" fill="none" stroke="#241810" stroke-width="2"/>
      <rect x="21" y="13" width="7" height="5" fill="none" stroke="#241810" stroke-width="2"/>
      <rect x="19" y="14" width="2" height="2" fill="#241810"/>
      <rect x="29" y="27" width="2" height="10" fill="#d4a847" transform="rotate(20 29 27)"/>
    </svg>`;
  }
  if(kind === "accounting"){
    return `<svg width="100%" viewBox="0 0 40 48" preserveAspectRatio="xMidYMax meet">
      <ellipse cx="20" cy="46" rx="11" ry="2.2" fill="rgba(0,0,0,0.35)"/>
      <rect x="13" y="36" width="6" height="9" fill="#2a2a2a"/>
      <rect x="21" y="36" width="6" height="9" fill="#2a2a2a"/>
      <rect x="9" y="24" width="22" height="14" rx="2" fill="#3a5c3a"/>
      <rect x="9" y="24" width="22" height="4" fill="#4f7a4f"/>
      <rect x="6" y="26" width="4" height="9" fill="#3a5c3a"/>
      <rect x="30" y="26" width="4" height="9" fill="#3a5c3a"/>
      <rect x="5" y="33" width="6" height="5" fill="#f2c9a0"/>
      <rect x="29" y="33" width="6" height="5" fill="#f2c9a0"/>
      <rect x="8" y="2" width="24" height="22" rx="6" fill="#f7d9b6"/>
      <rect x="6" y="0" width="28" height="9" rx="5" fill="#3a2418"/>
      <path d="M7 8 L33 8 L27 13.5 L13 13.5 Z" fill="#3aa15a" stroke="#241810" stroke-width="1.3"/>

      <rect x="7.7" y="30.3" width="1" height="4.4" fill="#d4a847"/>
    </svg>`;
  }
  if(kind === "door"){
    return `<svg width="100%" viewBox="0 0 40 48" preserveAspectRatio="xMidYMax meet">
      <ellipse cx="20" cy="46" rx="11" ry="2" fill="rgba(0,0,0,0.25)"/>
      <rect x="10" y="10" width="20" height="30" rx="1" fill="#5c3a24" stroke="#241810" stroke-width="2"/>
      <rect x="13" y="13" width="14" height="12" fill="#3a2418" opacity="0.5"/>

    </svg>`;
  }
}

function makeStation(dept){
  const clickable = dept.status === "active";
  const el = document.createElement(clickable ? "a" : "div");
  el.className = "station" + (clickable ? "" : "");
  if(clickable){
    el.href = `https://claude.ai/project/${dept.projectId}`;
    el.target = "_blank";
  }
  el.innerHTML = `
    ${clickable ? `<div class="speech">クリックでProjectへ</div>` : ""}
    <div class="sprite-wrap">${spriteSVG(dept.sprite)}</div>
    <div class="desk-base"></div>
    <div class="nameplate">${dept.name}<span class="sub">${dept.sub}</span>${dept.badge ? `<span class="badge">${dept.badge}</span>` : ""}</div>
  `;
  return el;
}

function makeTenantSlot(n){
  const el = document.createElement("div");
  el.className = "station tenant";
  el.innerHTML = `
    <div class="sprite-wrap">${spriteSVG("tenant")}</div>
    <div class="desk-base"></div>
    <div class="nameplate">空き区画 ${n}<span class="sub">テナント募集！</span></div>
  `;
  return el;
}

document.getElementById("active-row").append(...departments.map(makeStation));
const tenantRow = document.getElementById("tenant-row");
let emptySlotNum = 1;
for(let i=1; i<=TENANT_SLOTS; i++){
  const occupant = tenantDepartments[i-1];
  if(occupant){
    tenantRow.appendChild(makeStation(occupant));
  } else {
    tenantRow.appendChild(makeTenantSlot(emptySlotNum));
    emptySlotNum++;
  }
}
</script>

</body>
</html>
